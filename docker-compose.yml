services:
  backend:
    build: ./backend
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/coding_bot.db
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
