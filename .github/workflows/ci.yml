name: CI

# Runs on every push to main and on every pull request.
# Verifies the test suite + frontend build still pass before code can land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Install jq (for integration script assertions)
        run: sudo apt-get update -y && sudo apt-get install -y jq sqlite3

      - name: Run pytest unit tests
        working-directory: backend
        run: python -m pytest tests/ -v

      - name: Run integration tests
        run: bash backend/tests/integration.sh

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  deploy:
    name: Deploy to Fly.io
    needs: [backend-tests, frontend-build, e2e]
    # Only deploy on direct push to main (not on PRs), and skip when manually
    # dispatched if the trigger isn't main. FLY_API_TOKEN must be set in
    # repository secrets — see docs/DEPLOY_FLY.md.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      # Serialize deploys to avoid Fly rejecting overlapping releases.
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Check FLY_API_TOKEN is configured
        id: check_token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN secret not configured — skipping deploy. See docs/DEPLOY_FLY.md §10."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check_token.outputs.skip == 'false'

      - name: Deploy to Fly.io
        if: steps.check_token.outputs.skip == 'false'
        # VITE_SENTRY_DSN and VITE_CF_BEACON are passed as Docker build args
        # so they end up baked into the frontend bundle at build time.
        # If a secret isn't set in this repo, the corresponding feature is
        # silently disabled — forks deploying their own copy get a clean
        # frontend with no telemetry pointing at coding-coach.org.
        run: |
          flyctl deploy --remote-only \
            --build-arg VITE_SENTRY_DSN="$VITE_SENTRY_DSN" \
            --build-arg VITE_CF_BEACON="$VITE_CF_BEACON"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_CF_BEACON: ${{ secrets.VITE_CF_BEACON }}
