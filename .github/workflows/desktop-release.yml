name: Desktop release

# Builds CodingBot.app (macOS), CodingBot.exe (Windows), CodingBot (Linux)
# Triggered by: pushing a tag like v1.0.0, or manual dispatch.
# Outputs: GitHub release with platform-specific zips attached.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: CodingBot-macos-arm64
            executable_path: dist/CodingBot.app
          - os: windows-latest
            artifact: CodingBot-windows-x64
            executable_path: dist/CodingBot
          - os: ubuntu-latest
            artifact: CodingBot-linux-x64
            executable_path: dist/CodingBot

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r desktop/requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Fetch Pyodide + build frontend
        working-directory: frontend
        env:
          VITE_PYODIDE_URL: /pyodide/
        run: |
          npm run fetch-pyodide
          npm run build

      - name: Build with PyInstaller
        run: pyinstaller desktop/launcher.spec --noconfirm --clean

      - name: Package artifact (macOS — zip the .app)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -ry ${{ matrix.artifact }}.zip CodingBot.app

      - name: Package artifact (Windows — zip the folder)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CodingBot/* -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Package artifact (Linux — tar the folder)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz CodingBot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false
